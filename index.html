<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Iron Log" />
  <title>Iron Log</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; background: #0d0d0d; color: #f0e6d3; font-family: 'DM Sans', sans-serif; }
    input[type=number]::-webkit-inner-spin-button,
    input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: #111; }
    ::-webkit-scrollbar-thumb { background: #2a2a2a; border-radius: 4px; }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes toastIn {
      from { opacity: 0; transform: translateX(-50%) translateY(10px); }
      to   { opacity: 1; transform: translateX(-50%) translateY(0); }
    }

    /* ── Layout ── */
    #app { max-width: 520px; margin: 0 auto; min-height: 100vh; display: flex; flex-direction: column; }

    header {
      display: flex; justify-content: space-between; align-items: center;
      padding: 16px 20px 12px; border-bottom: 1px solid #1a1a1a;
      position: sticky; top: 0; background: #0d0d0d; z-index: 10;
      flex-wrap: wrap; gap: 8px;
    }
    .logo { font-family: 'Playfair Display', serif; font-size: 22px; letter-spacing: 1px; color: #c8a96e; }
    nav { display: flex; gap: 4px; }
    .nav-btn {
      background: transparent; border: none; color: #666;
      font-family: inherit; font-size: 13px; padding: 6px 12px;
      border-radius: 8px; cursor: pointer; border-bottom: 2px solid transparent;
      transition: all .2s;
    }
    .nav-btn.active { color: #c8a96e; background: #c8a96e18; border-bottom-color: #c8a96e; }

    main { flex: 1; overflow: auto; padding-bottom: 80px; }
    .tab { padding: 20px 20px 0; animation: fadeInUp .25s ease; }
    .tab.hidden { display: none; }

    /* ── Cards ── */
    .card {
      background: #111; border: 1px solid #1e1e1e;
      border-radius: 12px; padding: 14px 16px; margin-bottom: 10px;
    }
    .form-card {
      background: #111; border: 1px solid #2a2a2a;
      border-radius: 14px; padding: 20px 18px; margin-top: 16px;
      animation: fadeInUp .2s ease;
    }
    .form-title { color: #c8a96e; font-size: 13px; letter-spacing: .5px; text-transform: uppercase; margin-bottom: 20px; }

    /* ── Labels ── */
    .label { color: #666; font-size: 11px; letter-spacing: .5px; text-transform: uppercase; margin-bottom: 8px; }
    .section-title { color: #c8a96e; font-size: 13px; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 12px; }

    /* ── Pills ── */
    .pills { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 16px; }
    .pill {
      padding: 6px 14px; border-radius: 99px;
      border: 1.5px solid #333; background: transparent;
      color: #999; font-size: 13px; font-family: inherit;
      cursor: pointer; transition: all .2s; white-space: nowrap;
    }
    .pill.active { border-color: #c8a96e; background: #c8a96e22; color: #c8a96e; }

    /* ── Inputs ── */
    .input {
      background: #1a1a1a; border: 1px solid #2a2a2a;
      color: #f0e6d3; border-radius: 8px;
      padding: 9px 12px; font-size: 14px; font-family: inherit;
      width: 100%;
    }
    textarea.input { resize: vertical; }
    .input-row { display: flex; align-items: center; gap: 8px; }
    .weight-val {
      width: 72px; text-align: center;
      background: #1a1a1a; border: 1px solid #333;
      color: #f0e6d3; border-radius: 8px;
      padding: 8px 4px; font-size: 18px; font-family: inherit;
    }
    .unit { color: #555; font-size: 13px; }

    /* ── Buttons ── */
    .btn-round {
      width: 36px; height: 36px; border-radius: 8px;
      border: 1px solid #333; background: #222;
      color: #c8a96e; font-size: 18px; cursor: pointer;
      display: inline-flex; align-items: center; justify-content: center;
      font-family: inherit; transition: background .15s; flex-shrink: 0;
    }
    .btn-save {
      padding: 12px 28px; border-radius: 10px; border: none;
      background: #c8a96e; color: #0d0d0d;
      font-size: 14px; font-weight: 600; cursor: pointer; font-family: inherit;
    }
    .btn-cancel {
      padding: 12px 20px; border-radius: 10px;
      border: 1px solid #2a2a2a; background: transparent;
      color: #666; font-size: 14px; cursor: pointer; font-family: inherit;
    }
    .btn-add-strength {
      flex: 1; padding: 14px; border-radius: 12px;
      border: 1px dashed #3a3020; background: #1a1505;
      color: #c8a96e; font-size: 14px; cursor: pointer; font-family: inherit;
    }
    .btn-add-cardio {
      flex: 1; padding: 14px; border-radius: 12px;
      border: 1px dashed #1a3a1a; background: #0d1f0d;
      color: #7ec87e; font-size: 14px; cursor: pointer; font-family: inherit;
    }
    .btn-dashed {
      background: none; border: 1px dashed #333; color: #555;
      border-radius: 8px; padding: 6px 14px; font-size: 13px;
      cursor: pointer; font-family: inherit; margin-bottom: 20px;
    }
    .btn-icon { background: none; border: none; color: #555; cursor: pointer; font-size: 14px; padding: 4px; }
    .btn-icon.del { color: #c44; }

    /* ── Add buttons row ── */
    .add-row { display: flex; gap: 12px; margin-top: 24px; }

    /* ── Date nav ── */
    .date-nav { display: flex; align-items: center; gap: 10px; margin-bottom: 24px; flex-wrap: wrap; }
    .date-nav input[type=date] {
      background: #1a1a1a; border: 1px solid #333; color: #f0e6d3;
      padding: 8px 14px; border-radius: 10px; font-size: 14px; font-family: inherit;
    }
    .btn-today {
      margin-left: auto; padding: 6px 14px; border-radius: 8px;
      border: 1px solid #2a2a2a; background: transparent;
      color: #666; font-size: 12px; cursor: pointer; font-family: inherit;
    }

    /* ── Session card header ── */
    .scard-head { display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
    .scard-meta { display: flex; align-items: center; gap: 10px; }
    .scard-icon { font-size: 22px; }
    .scard-name { color: #f0e6d3; font-weight: 500; font-size: 15px; }
    .scard-sub-gold { color: #c8a96e; font-size: 13px; }
    .scard-sub-green { color: #7ec87e; font-size: 13px; }
    .scard-actions { display: flex; gap: 8px; align-items: center; }
    .scard-detail { margin-top: 12px; padding-top: 12px; border-top: 1px solid #222; font-size: 13px; color: #888; }
    .set-chip {
      display: inline-block; background: #1a1a1a; border: 1px solid #2a2a2a;
      border-radius: 6px; padding: 3px 10px; margin-right: 6px; margin-bottom: 4px; font-size: 12px;
    }

    /* ── Weight total box ── */
    .weight-total {
      background: #1a1a1a; border: 1px solid #2a2a2a;
      border-radius: 10px; padding: 12px 16px; margin-bottom: 20px;
    }
    .weight-total-num { color: #c8a96e; font-size: 22px; font-weight: 600; }

    /* ── Sets row ── */
    .set-row { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
    .set-label { color: #555; font-size: 13px; width: 56px; }
    .set-reps { color: #f0e6d3; font-size: 16px; width: 28px; text-align: center; }

    /* ── Grid 2col ── */
    .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 16px; }

    /* ── Empty state ── */
    .empty { color: #444; text-align: center; padding: 40px 0; font-size: 14px; }

    /* ── Progress rows ── */
    .prog-row {
      display: flex; justify-content: space-between; align-items: center;
      padding: 10px 0; border-bottom: 1px solid #1a1a1a;
    }
    .prog-date { color: #888; font-size: 13px; }
    .prog-sub { color: #555; font-size: 12px; }
    .prog-val { font-size: 17px; font-weight: 600; }

    /* ── Chart ── */
    .chart-wrap { background: #111; border-radius: 12px; padding: 16px 8px 8px; border: 1px solid #1e1e1e; margin-bottom: 20px; }
    .chart-label-top { color: #555; font-size: 11px; margin-bottom: 4px; padding-left: 8px; }

    /* ── Settings bar row ── */
    .bar-row { background: #111; border: 1px solid #1e1e1e; border-radius: 12px; padding: 14px 16px; margin-bottom: 10px; }
    .bar-inner { display: flex; justify-content: space-between; align-items: center; gap: 12px; }
    .bar-weight-wrap { display: flex; align-items: center; gap: 6px; flex-shrink: 0; }
    .bar-weight-input { background: #1a1a1a; border: 1px solid #2a2a2a; color: #f0e6d3; border-radius: 8px; padding: 8px; font-size: 14px; font-family: inherit; width: 64px; text-align: center; }

    /* ── Toast ── */
    #toast {
      position: fixed; bottom: 32px; left: 50%; transform: translateX(-50%);
      background: #c8a96e; color: #0d0d0d;
      padding: 10px 24px; border-radius: 99px;
      font-size: 14px; font-weight: 600; z-index: 999;
      animation: toastIn .2s ease; display: none;
    }

    /* ── Loading ── */
    #loading { color: #444; text-align: center; padding-top: 120px; font-size: 14px; }

    /* ── Checkbox ── */
    .check-row { display: flex; align-items: center; gap: 8px; margin-bottom: 16px; cursor: pointer; color: #aaa; font-size: 14px; }
    .check-row input[type=checkbox] { accent-color: #c8a96e; width: 16px; height: 16px; cursor: pointer; }

    /* ── About ── */
    .about-text { color: #444; font-size: 13px; line-height: 1.7; margin-top: 8px; }
  </style>
</head>
<body>
<div id="app">
  <div id="loading">Conectando…</div>
</div>

<div id="toast"></div>

<script>
// ── Config ────────────────────────────────────────────────────────────────────
const SUPABASE_URL = 'https://mzimwwqhioptlccvonrl.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im16aW13d3FoaW9wdGxjY3ZvbnJsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzczMzg4MzksImV4cCI6MjA5MjkxNDgzOX0.qUQTv_zVpscjP8nMyGWDZTEgGGIU9EJq_y3_bOsU9PE';

const STRENGTH_EXERCISES = [
  { id: 'bench',    name: 'Press de Banca',       icon: '🏋️' },
  { id: 'military', name: 'Press Militar',         icon: '🪖' },
  { id: 'squat',    name: 'Sentadillas',           icon: '🦵' },
  { id: 'deadlift', name: 'Peso Muerto',           icon: '⚡' },
  { id: 'pullup',   name: 'Dominadas / Pull-ups',  icon: '🔱' },
];
const CARDIO_TYPES = [
  { id: 'swim', name: 'Natación',   icon: '🏊' },
  { id: 'bike', name: 'Bicicleta',  icon: '🚴' },
  { id: 'run',  name: 'Correr',     icon: '🏃' },
  { id: 'hike', name: 'Senderismo', icon: '🥾' },
];
const DEFAULT_SETTINGS = {
  bars: [
    { id: 'olympic', name: 'Olímpica',     weight: 45 },
    { id: 'z',       name: 'Barra Z',      weight: 25 },
    { id: 'thin',    name: 'Delgada/Rosca',weight: 15 },
  ],
  adjusterWeight: 20,
};

// ── State ─────────────────────────────────────────────────────────────────────
let STATE = {
  tab: 'log',
  sessions: [],
  settings: { ...DEFAULT_SETTINGS },
  selectedDate: todayStr(),
  addingType: null,   // null | 'strength' | 'cardio'
  form: null,
  progressView: 'strength',
  progressEx: 'bench',
};

// ── Supabase helpers ──────────────────────────────────────────────────────────
async function sbFetch(path, opts = {}) {
  const res = await fetch(SUPABASE_URL + '/rest/v1/' + path, {
    headers: {
      'apikey': SUPABASE_KEY,
      'Authorization': 'Bearer ' + SUPABASE_KEY,
      'Content-Type': 'application/json',
      'Prefer': opts.prefer || '',
      ...opts.headers,
    },
    method: opts.method || 'GET',
    body: opts.body ? JSON.stringify(opts.body) : undefined,
  });
  if (!res.ok && res.status !== 204) {
    const err = await res.text();
    throw new Error(err);
  }
  if (res.status === 204) return null;
  return res.json();
}

async function loadSessions() {
  const rows = await sbFetch('sessions?order=date.desc');
  return (rows || []).map(r => ({ id: r.id, date: r.date, type: r.type, ...r.data }));
}

async function saveSession(session) {
  const { id, date, type, ...data } = session;
  await sbFetch('sessions', {
    method: 'POST',
    prefer: 'return=minimal',
    body: { id, date, type, data },
  });
}

async function deleteSession(id) {
  await sbFetch('sessions?id=eq.' + id, { method: 'DELETE' });
}

async function loadSettings() {
  const rows = await sbFetch('settings?id=eq.default');
  if (rows && rows.length > 0) return rows[0].data;
  return null;
}

async function saveSettings(data) {
  await sbFetch('settings', {
    method: 'POST',
    prefer: 'resolution=merge-duplicates,return=minimal',
    body: { id: 'default', data },
  });
}

// ── Utils ─────────────────────────────────────────────────────────────────────
function todayStr() {
  return new Date().toISOString().slice(0, 10);
}
function fmtDate(iso) {
  const [y, m, d] = iso.split('-');
  return `${d}/${m}/${y}`;
}
function uid() {
  return Date.now().toString(36) + Math.random().toString(36).slice(2, 6);
}
function escH(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function exInfo(id) { return STRENGTH_EXERCISES.find(e => e.id === id) || {}; }
function ctInfo(id) { return CARDIO_TYPES.find(c => c.id === id) || {}; }
function barInfo(id) { return STATE.settings.bars.find(b => b.id === id) || {}; }
function calcTotal(form) {
  const bar = barInfo(form.barId);
  return (bar.weight || 0) + (form.useAdjusters ? STATE.settings.adjusterWeight : 0) + (form.addedWeight || 0);
}

let toastTimer = null;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.display = 'block';
  if (toastTimer) clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { t.style.display = 'none'; }, 2500);
}

// ── Render ────────────────────────────────────────────────────────────────────
function render() {
  document.getElementById('app').innerHTML = `
    <header>
      <span class="logo">IRON LOG</span>
      <nav>
        ${['log','progress','settings'].map(k => `
          <button class="nav-btn ${STATE.tab===k?'active':''}" onclick="setTab('${k}')">
            ${{log:'📋 Registro',progress:'📈 Progreso',settings:'⚙️ Ajustes'}[k]}
          </button>`).join('')}
      </nav>
    </header>
    <main>
      <div id="tab-log"      class="tab ${STATE.tab!=='log'      ?'hidden':''}"> ${renderLog()}      </div>
      <div id="tab-progress" class="tab ${STATE.tab!=='progress' ?'hidden':''}"> ${renderProgress()} </div>
      <div id="tab-settings" class="tab ${STATE.tab!=='settings' ?'hidden':''}"> ${renderSettings()} </div>
    </main>
  `;
}

// ── LOG TAB ───────────────────────────────────────────────────────────────────
function renderLog() {
  const daySessions = STATE.sessions.filter(s => s.date === STATE.selectedDate);
  return `
    <div class="date-nav">
      <button class="btn-round" onclick="shiftDate(-1)">‹</button>
      <input type="date" value="${STATE.selectedDate}" onchange="setDate(this.value)" />
      <button class="btn-round" onclick="shiftDate(1)">›</button>
      <button class="btn-today" onclick="setDate('${todayStr()}')">Hoy</button>
    </div>

    ${daySessions.length === 0 && !STATE.addingType
      ? `<div class="empty">Sin sesiones para este día</div>`
      : daySessions.map(s => renderSessionCard(s)).join('')}

    ${STATE.addingType === 'strength' ? renderStrengthForm() : ''}
    ${STATE.addingType === 'cardio'   ? renderCardioForm()   : ''}

    ${!STATE.addingType ? `
      <div class="add-row">
        <button class="btn-add-strength" onclick="openStrength()">+ Musculatura</button>
        <button class="btn-add-cardio"   onclick="openCardio()">+ Cardio</button>
      </div>` : ''}
  `;
}

function renderSessionCard(s) {
  const isStr = s.type === 'strength';
  const ex    = isStr ? exInfo(s.exerciseId) : ctInfo(s.cardioId);
  const bar   = isStr ? barInfo(s.barId) : null;
  const open  = STATE._openCard === s.id;
  return `
    <div class="card">
      <div class="scard-head" onclick="toggleCard('${s.id}')">
        <div class="scard-meta">
          <span class="scard-icon">${escH(ex.icon||'')}</span>
          <div>
            <div class="scard-name">${escH(ex.name||'')}</div>
            ${isStr
              ? `<div class="scard-sub-gold">${s._totalWeight||0} lbs totales</div>`
              : `<div class="scard-sub-green">${s.duration} min${s.distance?' · '+escH(s.distance)+' km':''}</div>`}
          </div>
        </div>
        <div class="scard-actions">
          <span style="color:#444;font-size:14px">${open?'▲':'▼'}</span>
          <button class="btn-icon del" onclick="event.stopPropagation();doDelete('${s.id}')">✕</button>
        </div>
      </div>
      ${open && isStr ? `
        <div class="scard-detail">
          <div>Barra: ${escH(bar?.name||'—')} (${bar?.weight||0} lbs)${s.useAdjusters?' + Ajustadores ('+STATE.settings.adjusterWeight+' lbs)':''}</div>
          <div>Peso en discos: ${s.addedWeight||0} lbs</div>
          <div style="margin-top:8px">
            ${(s.sets||[]).map((st,i)=>`<span class="set-chip">Serie ${i+1}: ${st.reps} reps</span>`).join('')}
          </div>
        </div>` : ''}
      ${open && !isStr && s.notes ? `
        <div class="scard-detail">${escH(s.notes)}</div>` : ''}
    </div>`;
}

function renderStrengthForm() {
  const f = STATE.form;
  const total = calcTotal(f);
  return `
    <div class="form-card">
      <div class="form-title">Nueva sesión — Musculatura</div>

      <div class="label">Ejercicio</div>
      <div class="pills">
        ${STRENGTH_EXERCISES.map(e=>`
          <button class="pill ${f.exerciseId===e.id?'active':''}" onclick="formSet('exerciseId','${e.id}')">
            ${escH(e.icon)} ${escH(e.name)}
          </button>`).join('')}
      </div>

      <div class="label">Barra</div>
      <div class="pills">
        ${STATE.settings.bars.map(b=>`
          <button class="pill ${f.barId===b.id?'active':''}" onclick="formSet('barId','${b.id}')">
            ${escH(b.name)} (${b.weight} lbs)
          </button>`).join('')}
      </div>

      <label class="check-row">
        <input type="checkbox" ${f.useAdjusters?'checked':''} onchange="formSet('useAdjusters',this.checked)" />
        Ajustadores (+${STATE.settings.adjusterWeight} lbs)
      </label>

      <div class="label">Peso en discos añadido</div>
      <div class="input-row" style="margin-bottom:16px">
        <button class="btn-round" onclick="adjWeight(-5)">−</button>
        <input class="weight-val" type="number" value="${f.addedWeight}" min="0" step="5"
          onchange="formSet('addedWeight',Math.max(0,Number(this.value)))" />
        <button class="btn-round" onclick="adjWeight(5)">+</button>
        <span class="unit">lbs</span>
      </div>

      <div class="weight-total">
        <span style="color:#666;font-size:13px">Peso total: </span>
        <span class="weight-total-num">${total}</span>
        <span style="color:#666;font-size:13px"> lbs</span>
      </div>

      <div class="label">Series y repeticiones</div>
      ${f.sets.map((s,i)=>`
        <div class="set-row">
          <span class="set-label">Serie ${i+1}</span>
          <button class="btn-round" onclick="adjReps(${i},-1)">−</button>
          <span class="set-reps" id="reps-${i}">${s.reps}</span>
          <button class="btn-round" onclick="adjReps(${i},1)">+</button>
          <span class="unit">reps</span>
          ${f.sets.length>1?`<button class="btn-icon del" onclick="removeSet(${i})">✕</button>`:''}
        </div>`).join('')}
      <button class="btn-dashed" onclick="addSet()">+ Añadir serie</button>

      <div style="display:flex;gap:10px">
        <button class="btn-save" onclick="doSave()">Guardar</button>
        <button class="btn-cancel" onclick="cancelForm()">Cancelar</button>
      </div>
    </div>`;
}

function renderCardioForm() {
  const f = STATE.form;
  return `
    <div class="form-card">
      <div class="form-title">Nueva sesión — Cardio</div>

      <div class="label">Actividad</div>
      <div class="pills">
        ${CARDIO_TYPES.map(c=>`
          <button class="pill ${f.cardioId===c.id?'active':''}" onclick="formSet('cardioId','${c.id}')">
            ${escH(c.icon)} ${escH(c.name)}
          </button>`).join('')}
      </div>

      <div class="grid2">
        <div>
          <div class="label">Duración (min)</div>
          <input class="input" type="number" value="${f.duration}" min="1"
            onchange="formSet('duration',Number(this.value))" />
        </div>
        <div>
          <div class="label">Distancia (km)</div>
          <input class="input" type="text" value="${escH(f.distance)}" placeholder="—"
            onchange="formSet('distance',this.value)" />
        </div>
      </div>

      <div class="label">Notas</div>
      <textarea class="input" rows="3" placeholder="Observaciones opcionales…"
        onchange="formSet('notes',this.value)">${escH(f.notes)}</textarea>

      <div style="display:flex;gap:10px;margin-top:16px">
        <button class="btn-save" style="background:#2a5a2a;color:#7ec87e" onclick="doSave()">Guardar</button>
        <button class="btn-cancel" onclick="cancelForm()">Cancelar</button>
      </div>
    </div>`;
}

// ── PROGRESS TAB ──────────────────────────────────────────────────────────────
function renderProgress() {
  const v = STATE.progressView;
  const ex = STATE.progressEx;

  const strHistory = STATE.sessions
    .filter(s => s.type==='strength' && s.exerciseId===ex)
    .sort((a,b) => b.date.localeCompare(a.date))
    .slice(0, 20);

  const cardioList = STATE.sessions
    .filter(s => s.type==='cardio')
    .sort((a,b) => b.date.localeCompare(a.date));

  return `
    <div class="pills">
      <button class="pill ${v==='strength'?'active':''}" onclick="setProgView('strength')">🏋️ Musculatura</button>
      <button class="pill ${v==='cardio'?'active':''}"   onclick="setProgView('cardio')">🏃 Cardio</button>
    </div>

    ${v==='strength' ? `
      <div class="label">Ejercicio</div>
      <div class="pills">
        ${STRENGTH_EXERCISES.map(e=>`
          <button class="pill ${ex===e.id?'active':''}" onclick="setProgEx('${e.id}')">
            ${escH(e.icon)} ${escH(e.name)}
          </button>`).join('')}
      </div>
      ${strHistory.length===0
        ? `<div class="empty">Sin datos para este ejercicio</div>`
        : renderChart(strHistory.map(s=>({date:s.date,val:s._totalWeight||0})).reverse()) +
          strHistory.map(s=>`
            <div class="prog-row">
              <div>
                <div class="prog-date">${fmtDate(s.date)}</div>
                <div class="prog-sub">${(s.sets||[]).length} series</div>
              </div>
              <div class="prog-val" style="color:#c8a96e">${s._totalWeight||0} lbs</div>
            </div>`).join('')
      }` : ''}

    ${v==='cardio' ? `
      ${cardioList.length===0
        ? `<div class="empty">Sin sesiones de cardio aún</div>`
        : cardioList.map(s=>{
            const ct = ctInfo(s.cardioId);
            return `
              <div class="prog-row">
                <div>
                  <div class="prog-date">${fmtDate(s.date)}</div>
                  <div class="prog-sub">${escH(ct.icon||'')} ${escH(ct.name||'')}${s.distance?' · '+escH(s.distance)+' km':''}</div>
                </div>
                <div class="prog-val" style="color:#7ec87e">${s.duration} min</div>
              </div>`;
          }).join('')
      }` : ''}
  `;
}

function renderChart(data) {
  if (data.length < 2) return '';
  const vals = data.map(d=>d.val);
  const min = Math.min(...vals), max = Math.max(...vals);
  const range = max - min || 1;
  const W=320, H=90;
  const px = i => (i/(data.length-1))*(W-20)+10;
  const py = v => H-16-((v-min)/range)*(H-32);
  const pathD = data.map((d,i)=>`${i===0?'M':'L'}${px(i)},${py(d.val)}`).join(' ');
  const areaD = pathD + ` L${px(data.length-1)},${H-16} L${px(0)},${H-16} Z`;
  return `
    <div class="chart-wrap">
      <div class="chart-label-top">Peso total (lbs)</div>
      <svg width="100%" viewBox="0 0 ${W} ${H}" style="overflow:visible">
        ${[0,.5,1].map(t=>`<line x1="10" y1="${py(min+t*range)}" x2="${W-10}" y2="${py(min+t*range)}" stroke="#1e1e1e" stroke-width="1"/>`).join('')}
        <path d="${areaD}" fill="#c8a96e18"/>
        <path d="${pathD}" stroke="#c8a96e" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
        ${data.map((d,i)=>`<circle cx="${px(i)}" cy="${py(d.val)}" r="3" fill="#c8a96e"/>`).join('')}
        <text x="10" y="${H-2}" font-size="9" fill="#444">${data[0]?.date?.slice(5)}</text>
        <text x="${W-10}" y="${H-2}" font-size="9" fill="#444" text-anchor="end">${data[data.length-1]?.date?.slice(5)}</text>
      </svg>
    </div>`;
}

// ── SETTINGS TAB ──────────────────────────────────────────────────────────────
function renderSettings() {
  const cfg = STATE.settings;
  return `
    <div class="section-title">Barras</div>
    ${cfg.bars.map(b=>`
      <div class="bar-row">
        <div class="bar-inner">
          <input class="input" style="flex:1" value="${escH(b.name)}"
            onchange="updateBarName('${b.id}',this.value)" />
          <div class="bar-weight-wrap">
            <input class="bar-weight-input" type="number" value="${b.weight}"
              onchange="updateBarWeight('${b.id}',this.value)" />
            <span class="unit">lbs</span>
          </div>
        </div>
      </div>`).join('')}

    <div class="section-title" style="margin-top:24px">Ajustadores</div>
    <div class="bar-row">
      <div class="bar-inner">
        <span style="color:#aaa;font-size:14px;flex:1">Peso total de ajustadores</span>
        <div class="bar-weight-wrap">
          <input class="bar-weight-input" type="number" value="${cfg.adjusterWeight}"
            onchange="updateAdjuster(this.value)" />
          <span class="unit">lbs</span>
        </div>
      </div>
    </div>

    <div style="margin-top:20px">
      <button class="btn-save" onclick="doSaveSettings()">Guardar ajustes</button>
    </div>

    <div class="section-title" style="margin-top:32px">Acerca de</div>
    <p class="about-text">
      Iron Log · Tracker personal de entrenamiento.<br>
      Los datos se guardan en Supabase y están disponibles desde cualquier dispositivo.
    </p>
  `;
}

// ── Event handlers ────────────────────────────────────────────────────────────
function setTab(t) { STATE.tab = t; render(); }
function setDate(d) { STATE.selectedDate = d; STATE.addingType = null; STATE.form = null; render(); }
function shiftDate(delta) {
  const d = new Date(STATE.selectedDate);
  d.setDate(d.getDate() + delta);
  setDate(d.toISOString().slice(0, 10));
}
function toggleCard(id) {
  STATE._openCard = STATE._openCard === id ? null : id;
  render();
}

function openStrength() {
  STATE.form = {
    type: 'strength',
    exerciseId: STRENGTH_EXERCISES[0].id,
    barId: STATE.settings.bars[0]?.id || null,
    useAdjusters: false,
    addedWeight: 0,
    sets: [{ reps: 5 }],
  };
  STATE.addingType = 'strength';
  render();
}
function openCardio() {
  STATE.form = { type:'cardio', cardioId:'swim', duration:30, distance:'', notes:'' };
  STATE.addingType = 'cardio';
  render();
}
function cancelForm() { STATE.addingType = null; STATE.form = null; render(); }

function formSet(key, val) {
  STATE.form[key] = val;
  render();
}
function adjWeight(delta) {
  STATE.form.addedWeight = Math.max(0, (STATE.form.addedWeight || 0) + delta);
  render();
}
function adjReps(i, delta) {
  STATE.form.sets[i].reps = Math.max(1, STATE.form.sets[i].reps + delta);
  render();
}
function addSet() {
  const last = STATE.form.sets[STATE.form.sets.length - 1];
  STATE.form.sets.push({ reps: last?.reps || 5 });
  render();
}
function removeSet(i) {
  STATE.form.sets.splice(i, 1);
  render();
}

async function doSave() {
  const f = STATE.form;
  const snapshot = { ...f };
  if (f.type === 'strength') {
    const bar = barInfo(f.barId);
    snapshot._totalWeight = (bar.weight||0) + (f.useAdjusters ? STATE.settings.adjusterWeight : 0) + (f.addedWeight||0);
  }
  const entry = { id: uid(), date: STATE.selectedDate, ...snapshot };
  try {
    await saveSession(entry);
    STATE.sessions.unshift(entry);
    STATE.addingType = null;
    STATE.form = null;
    render();
    showToast('✓ Sesión guardada');
  } catch(e) {
    showToast('Error al guardar');
    console.error(e);
  }
}

async function doDelete(id) {
  try {
    await deleteSession(id);
    STATE.sessions = STATE.sessions.filter(s => s.id !== id);
    render();
    showToast('Sesión eliminada');
  } catch(e) {
    showToast('Error al eliminar');
  }
}

function setProgView(v) { STATE.progressView = v; render(); }
function setProgEx(id)   { STATE.progressEx  = id; render(); }

function updateBarName(id, val)   { STATE.settings.bars.find(b=>b.id===id).name   = val; }
function updateBarWeight(id, val) { STATE.settings.bars.find(b=>b.id===id).weight = Number(val); }
function updateAdjuster(val)      { STATE.settings.adjusterWeight = Number(val); }

async function doSaveSettings() {
  try {
    await saveSettings(STATE.settings);
    render();
    showToast('✓ Ajustes guardados');
  } catch(e) {
    showToast('Error al guardar ajustes');
  }
}

// ── Init ──────────────────────────────────────────────────────────────────────
(async () => {
  try {
    const [sessions, settings] = await Promise.all([loadSessions(), loadSettings()]);
    STATE.sessions = sessions || [];
    STATE.settings = settings || DEFAULT_SETTINGS;
    // ensure bars array exists
    if (!STATE.settings.bars) STATE.settings = { ...DEFAULT_SETTINGS, ...STATE.settings };
  } catch(e) {
    console.error('Init error:', e);
    STATE.sessions = [];
    STATE.settings = DEFAULT_SETTINGS;
  }
  render();
})();
</script>
</body>
</html>

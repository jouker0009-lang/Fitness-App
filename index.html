<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Iron Log" />
  <title>Iron Log</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; background: #0d0d0d; color: #f0e6d3; font-family: 'DM Sans', sans-serif; }
    input[type=number]::-webkit-inner-spin-button { -webkit-appearance: none; }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: #111; }
    ::-webkit-scrollbar-thumb { background: #2a2a2a; border-radius: 4px; }
    @keyframes toastIn { from{opacity:0;transform:translateX(-50%) translateY(10px)} to{opacity:1;transform:translateX(-50%) translateY(0)} }
    @keyframes slideDown { from{opacity:0;transform:translateY(-8px)} to{opacity:1;transform:translateY(0)} }
    @keyframes spin { to{transform:rotate(360deg)} }

    #app { max-width:520px; margin:0 auto; min-height:100vh; display:flex; flex-direction:column; }
    header { display:flex; justify-content:space-between; align-items:center; padding:16px 20px 12px; border-bottom:1px solid #1a1a1a; position:sticky; top:0; background:#0d0d0d; z-index:10; flex-wrap:wrap; gap:8px; }
    .logo { font-family:'Playfair Display',serif; font-size:22px; letter-spacing:1px; color:#c8a96e; }
    nav { display:flex; gap:4px; }
    .nav-btn { background:transparent; border:none; color:#666; font-family:inherit; font-size:13px; padding:6px 12px; border-radius:8px; cursor:pointer; border-bottom:2px solid transparent; transition:color .2s,border-color .2s,background .2s; }
    .nav-btn.active { color:#c8a96e; background:#c8a96e18; border-bottom-color:#c8a96e; }
    main { flex:1; overflow:auto; padding-bottom:80px; }
    .tab { padding:20px 20px 0; display:none; }
    .tab.active { display:block; }
    .card { background:#111; border:1px solid #1e1e1e; border-radius:12px; padding:14px 16px; margin-bottom:10px; }
    .form-card { background:#111; border:1px solid #2a2a2a; border-radius:14px; padding:20px 18px; margin-top:16px; animation:slideDown .25s ease; }
    .form-title { color:#c8a96e; font-size:13px; letter-spacing:.5px; text-transform:uppercase; margin-bottom:20px; }
    .label { color:#666; font-size:11px; letter-spacing:.5px; text-transform:uppercase; margin-bottom:8px; }
    .section-title { color:#c8a96e; font-size:13px; letter-spacing:1px; text-transform:uppercase; margin-bottom:12px; }
    .pills { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:16px; }
    .pill { padding:6px 14px; border-radius:99px; border:1.5px solid #333; background:transparent; color:#999; font-size:13px; font-family:inherit; cursor:pointer; transition:all .2s; white-space:nowrap; }
    .pill.active { border-color:#c8a96e; background:#c8a96e22; color:#c8a96e; }
    .pill.green.active { border-color:#7ec87e; background:#7ec87e22; color:#7ec87e; }
    .input { background:#1a1a1a; border:1px solid #2a2a2a; color:#f0e6d3; border-radius:8px; padding:9px 12px; font-size:14px; font-family:inherit; width:100%; }
    textarea.input { resize:vertical; }
    .weight-val { width:72px; text-align:center; background:#1a1a1a; border:1px solid #333; color:#f0e6d3; border-radius:8px; padding:8px 4px; font-size:18px; font-family:inherit; }
    .unit { color:#555; font-size:13px; }
    .input-row { display:flex; align-items:center; gap:8px; }
    .btn-round { width:36px; height:36px; border-radius:8px; border:1px solid #333; background:#222; color:#c8a96e; font-size:18px; cursor:pointer; display:inline-flex; align-items:center; justify-content:center; font-family:inherit; flex-shrink:0; }
    .btn-save { padding:12px 28px; border-radius:10px; border:none; background:#c8a96e; color:#0d0d0d; font-size:14px; font-weight:600; cursor:pointer; font-family:inherit; }
    .btn-cancel { padding:12px 20px; border-radius:10px; border:1px solid #2a2a2a; background:transparent; color:#666; font-size:14px; cursor:pointer; font-family:inherit; }
    .btn-add-strength { flex:1; padding:14px; border-radius:12px; border:1px dashed #3a3020; background:#1a1505; color:#c8a96e; font-size:14px; cursor:pointer; font-family:inherit; }
    .btn-add-cardio { flex:1; padding:14px; border-radius:12px; border:1px dashed #1a3a1a; background:#0d1f0d; color:#7ec87e; font-size:14px; cursor:pointer; font-family:inherit; }
    .btn-dashed { background:none; border:1px dashed #333; color:#555; border-radius:8px; padding:6px 14px; font-size:13px; cursor:pointer; font-family:inherit; margin-bottom:20px; }
    .btn-icon { background:none; border:none; color:#555; cursor:pointer; font-size:14px; padding:4px; }
    .btn-icon.del { color:#c44; }
    .btn-today { margin-left:auto; padding:6px 14px; border-radius:8px; border:1px solid #2a2a2a; background:transparent; color:#666; font-size:12px; cursor:pointer; font-family:inherit; }
    .add-row { display:flex; gap:12px; margin-top:24px; }
    .date-nav { display:flex; align-items:center; gap:10px; margin-bottom:24px; flex-wrap:wrap; }
    .date-nav input[type=date] { background:#1a1a1a; border:1px solid #333; color:#f0e6d3; padding:8px 14px; border-radius:10px; font-size:14px; font-family:inherit; }
    .scard-head { display:flex; justify-content:space-between; align-items:center; cursor:pointer; }
    .scard-meta { display:flex; align-items:center; gap:10px; }
    .scard-icon { font-size:22px; }
    .scard-name { color:#f0e6d3; font-weight:500; font-size:15px; }
    .scard-sub-gold { color:#c8a96e; font-size:13px; }
    .scard-sub-green { color:#7ec87e; font-size:13px; }
    .scard-actions { display:flex; gap:8px; align-items:center; }
    .scard-detail { margin-top:12px; padding-top:12px; border-top:1px solid #222; font-size:13px; color:#888; animation:slideDown .2s ease; }
    .set-chip { display:inline-block; background:#1a1a1a; border:1px solid #2a2a2a; border-radius:6px; padding:3px 10px; margin-right:6px; margin-bottom:4px; font-size:12px; }
    .weight-total { background:#1a1a1a; border:1px solid #2a2a2a; border-radius:10px; padding:12px 16px; margin-bottom:20px; }
    .weight-total-num { color:#c8a96e; font-size:22px; font-weight:600; }
    .set-row { display:flex; align-items:center; gap:10px; margin-bottom:8px; }
    .set-label { color:#555; font-size:13px; width:56px; }
    .set-reps { color:#f0e6d3; font-size:16px; width:28px; text-align:center; }
    .grid2 { display:grid; grid-template-columns:1fr 1fr; gap:12px; margin-bottom:16px; }
    .empty { color:#444; text-align:center; padding:40px 0; font-size:14px; }
    .prog-row { display:flex; justify-content:space-between; align-items:center; padding:10px 0; border-bottom:1px solid #1a1a1a; }
    .prog-date { color:#888; font-size:13px; }
    .prog-sub { color:#555; font-size:12px; }
    .prog-val { font-size:17px; font-weight:600; }
    .chart-wrap { background:#111; border-radius:12px; padding:16px 8px 8px; border:1px solid #1e1e1e; margin-bottom:20px; }
    .chart-lbl { color:#555; font-size:11px; margin-bottom:4px; padding-left:8px; }
    .bar-row { background:#111; border:1px solid #1e1e1e; border-radius:12px; padding:14px 16px; margin-bottom:10px; }
    .bar-inner { display:flex; justify-content:space-between; align-items:center; gap:12px; }
    .bar-w { background:#1a1a1a; border:1px solid #2a2a2a; color:#f0e6d3; border-radius:8px; padding:8px; font-size:14px; font-family:inherit; width:64px; text-align:center; }
    .check-row { display:flex; align-items:center; gap:8px; margin-bottom:16px; cursor:pointer; color:#aaa; font-size:14px; }
    .check-row input { accent-color:#c8a96e; width:16px; height:16px; cursor:pointer; }
    .about-text { color:#444; font-size:13px; line-height:1.7; margin-top:8px; }
    #loading-screen { position:fixed; inset:0; background:#0d0d0d; display:flex; align-items:center; justify-content:center; flex-direction:column; gap:16px; z-index:100; transition:opacity .4s ease; }
    #loading-screen.hide { opacity:0; pointer-events:none; }
    .loading-logo { font-family:'Playfair Display',serif; font-size:28px; color:#c8a96e; letter-spacing:2px; }
    .loading-sub { color:#444; font-size:13px; }
    .spinner { width:24px; height:24px; border:2px solid #2a2a2a; border-top-color:#c8a96e; border-radius:50%; animation:spin .8s linear infinite; }
    #toast { position:fixed; bottom:32px; left:50%; transform:translateX(-50%); background:#c8a96e; color:#0d0d0d; padding:10px 24px; border-radius:99px; font-size:14px; font-weight:600; z-index:999; animation:toastIn .2s ease; display:none; white-space:nowrap; }
  </style>
</head>
<body>

<div id="loading-screen">
  <div class="loading-logo">IRON LOG</div>
  <div class="spinner"></div>
  <div class="loading-sub">Cargando datos...</div>
</div>

<div id="app" style="display:none">
  <header>
    <span class="logo">IRON LOG</span>
    <nav>
      <button class="nav-btn active" id="nav-log"      onclick="setTab('log')">Registro</button>
      <button class="nav-btn"        id="nav-progress" onclick="setTab('progress')">Progreso</button>
      <button class="nav-btn"        id="nav-settings" onclick="setTab('settings')">Ajustes</button>
    </nav>
  </header>
  <main>
    <div id="tab-log"      class="tab active"></div>
    <div id="tab-progress" class="tab"></div>
    <div id="tab-settings" class="tab"></div>
  </main>
</div>

<div id="toast"></div>

<script>
const SB_URL = 'https://mzimwwqhioptlccvonrl.supabase.co/rest/v1';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im16aW13d3FoaW9wdGxjY3ZvbnJsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzczMzg4MzksImV4cCI6MjA5MjkxNDgzOX0.qUQTv_zVpscjP8nMyGWDZTEgGGIU9EJq_y3_bOsU9PE';
const HDR = { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + SB_KEY, 'Content-Type': 'application/json' };

const EXERCISES = [
  { id:'bench',    name:'Press de Banca',      icon:'\u{1F3CB}\uFE0F' },
  { id:'military', name:'Press Militar',        icon:'\u{1FA96}' },
  { id:'squat',    name:'Sentadillas',          icon:'\u{1F9B5}' },
  { id:'deadlift', name:'Peso Muerto',          icon:'\u26A1' },
  { id:'pullup',   name:'Dominadas / Pull-ups', icon:'\u{1F531}' },
];
const CARDIOS = [
  { id:'swim', name:'Natacion',   icon:'\u{1F3CA}' },
  { id:'bike', name:'Bicicleta',  icon:'\u{1F6B4}' },
  { id:'run',  name:'Correr',     icon:'\u{1F3C3}' },
  { id:'hike', name:'Senderismo', icon:'\u{1F97E}' },
];
const DEFAULT_CFG = {
  bars: [
    { id:'olympic', name:'Olimpica',      weight:45 },
    { id:'z',       name:'Barra Z',       weight:25 },
    { id:'thin',    name:'Delgada/Rosca', weight:15 },
  ],
  adjusterWeight: 20,
};

const S = {
  tab:'log', sessions:[], cfg:JSON.parse(JSON.stringify(DEFAULT_CFG)),
  date:today(), adding:null, form:null, openCard:null,
  progView:'strength', progEx:'bench',
};

function today() { return new Date().toISOString().slice(0,10); }
function fmtDate(iso) { const [y,m,d]=iso.split('-'); return d+'/'+m+'/'+y; }
function uid() { return Date.now().toString(36)+Math.random().toString(36).slice(2,6); }
function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function exInfo(id)  { return EXERCISES.find(e=>e.id===id)||{}; }
function ctInfo(id)  { return CARDIOS.find(c=>c.id===id)||{}; }
function barInfo(id) { return S.cfg.bars.find(b=>b.id===id)||{}; }
function calcTotal(f) {
  const b=barInfo(f.barId);
  return (b.weight||0)+(f.useAdjusters?S.cfg.adjusterWeight:0)+(f.addedWeight||0);
}

let _tt;
function toast(msg,dur) {
  dur=dur||2500;
  const t=document.getElementById('toast');
  t.textContent=msg; t.style.display='block';
  clearTimeout(_tt); _tt=setTimeout(function(){ t.style.display='none'; },dur);
}

// Supabase
async function sbGet(table,q) {
  q=q||'';
  const r=await fetch(SB_URL+'/'+table+'?'+q,{headers:HDR});
  if(!r.ok){ const e=await r.text(); throw new Error(e); }
  return r.json();
}
async function sbPost(table,body,prefer) {
  prefer=prefer||'return=minimal';
  const r=await fetch(SB_URL+'/'+table,{
    method:'POST',
    headers:Object.assign({},HDR,{'Prefer':prefer}),
    body:JSON.stringify(body)
  });
  if(!r.ok){ const e=await r.text(); throw new Error(e); }
}
async function sbDel(table,q) {
  const r=await fetch(SB_URL+'/'+table+'?'+q,{method:'DELETE',headers:HDR});
  if(!r.ok){ const e=await r.text(); throw new Error(e); }
}

function rowToSession(row) {
  var d = row.data || {};
  return Object.assign({id:row.id,date:row.date,type:row.type},d);
}

async function fetchAll() {
  var rows = await sbGet('sessions','order=date.desc,created_at.desc');
  return (rows||[]).map(rowToSession);
}
async function fetchCfg() {
  var rows = await sbGet('settings','id=eq.default');
  return (rows&&rows.length>0) ? rows[0].data : null;
}
async function pushSession(s) {
  var id=s.id, date=s.date, type=s.type;
  var data=Object.assign({},s);
  delete data.id; delete data.date; delete data.type;
  await sbPost('sessions',{id:id,date:date,type:type,data:data});
}
async function pushCfg(cfg) {
  await sbPost('settings',{id:'default',data:cfg},'resolution=merge-duplicates,return=minimal');
}

// Tab switching
function setTab(name) {
  S.tab=name;
  document.querySelectorAll('.nav-btn').forEach(function(b){ b.classList.remove('active'); });
  document.querySelectorAll('.tab').forEach(function(t){ t.classList.remove('active'); });
  document.getElementById('nav-'+name).classList.add('active');
  document.getElementById('tab-'+name).classList.add('active');
  if(name==='progress') renderProgress();
  if(name==='settings') renderSettings();
}

// LOG
function renderLog() {
  document.getElementById('tab-log').innerHTML = buildLog();
}
function buildLog() {
  var day=S.sessions.filter(function(s){ return s.date===S.date; });
  var cards=day.length===0&&!S.adding ? '<div class="empty">Sin sesiones para este dia</div>' : day.map(buildCard).join('');
  var form=S.adding==='strength'?buildStrForm():S.adding==='cardio'?buildCrdForm():'';
  var addRow=!S.adding?'<div class="add-row"><button class="btn-add-strength" onclick="openStr()">+ Musculatura</button><button class="btn-add-cardio" onclick="openCrd()">+ Cardio</button></div>':'';
  return '<div class="date-nav">'
    +'<button class="btn-round" onclick="shiftDate(-1)">&#x2039;</button>'
    +'<input type="date" value="'+S.date+'" onchange="setDate(this.value)" />'
    +'<button class="btn-round" onclick="shiftDate(1)">&#x203A;</button>'
    +'<button class="btn-today" onclick="setDate(\''+today()+'\')">Hoy</button>'
    +'</div>'
    +'<div id="sessions-list">'+cards+'</div>'
    +'<div id="form-area">'+form+'</div>'
    +addRow;
}

function buildCard(s) {
  var isStr=s.type==='strength';
  var ex=isStr?exInfo(s.exerciseId):ctInfo(s.cardioId);
  var bar=isStr?barInfo(s.barId):null;
  var open=S.openCard===s.id;
  var sub=isStr
    ?'<div class="scard-sub-gold">'+(s._totalWeight||0)+' lbs totales</div>'
    :'<div class="scard-sub-green">'+s.duration+' min'+(s.distance?' &middot; '+esc(s.distance)+' km':'')+'</div>';
  var detail='';
  if(open&&isStr){
    var chips=(s.sets||[]).map(function(st,i){ return '<span class="set-chip">Serie '+(i+1)+': '+st.reps+' reps</span>'; }).join('');
    detail='<div class="scard-detail">'
      +'<div>Barra: '+esc(bar?bar.name:'')+(bar?' ('+bar.weight+' lbs)':'')+(s.useAdjusters?' + Ajustadores ('+S.cfg.adjusterWeight+' lbs)':'')+'</div>'
      +'<div style="margin-top:4px">Discos: '+(s.addedWeight||0)+' lbs</div>'
      +'<div style="margin-top:8px">'+chips+'</div>'
      +'</div>';
  }
  if(open&&!isStr&&s.notes){ detail='<div class="scard-detail">'+esc(s.notes)+'</div>'; }
  return '<div class="card" id="card-'+s.id+'">'
    +'<div class="scard-head" onclick="toggleCard(\''+s.id+'\')">'
    +'<div class="scard-meta"><span class="scard-icon">'+esc(ex.icon||'')+'</span>'
    +'<div><div class="scard-name">'+esc(ex.name||'')+'</div>'+sub+'</div></div>'
    +'<div class="scard-actions"><span style="color:#444;font-size:14px">'+(open?'&#x25B2;':'&#x25BC;')+'</span>'
    +'<button class="btn-icon del" onclick="event.stopPropagation();doDelete(\''+s.id+'\')">&#x2715;</button>'
    +'</div></div>'+detail+'</div>';
}

function buildStrForm() {
  var f=S.form;
  var total=calcTotal(f);
  var exPills=EXERCISES.map(function(e){
    return '<button class="pill'+(f.exerciseId===e.id?' active':'')+'" onclick="fset(\'exerciseId\',\''+e.id+'\')">'+esc(e.icon)+' '+esc(e.name)+'</button>';
  }).join('');
  var barPills=S.cfg.bars.map(function(b){
    return '<button class="pill'+(f.barId===b.id?' active':'')+'" onclick="fset(\'barId\',\''+b.id+'\')">'+esc(b.name)+' ('+b.weight+' lbs)</button>';
  }).join('');
  var sets=f.sets.map(function(s,i){
    var del=f.sets.length>1?'<button class="btn-icon del" onclick="removeSet('+i+')">&#x2715;</button>':'';
    return '<div class="set-row"><span class="set-label">Serie '+(i+1)+'</span>'
      +'<button class="btn-round" onclick="adjReps('+i+',-1)">&#x2212;</button>'
      +'<span class="set-reps" id="reps-'+i+'">'+s.reps+'</span>'
      +'<button class="btn-round" onclick="adjReps('+i+',1)">+</button>'
      +'<span class="unit">reps</span>'+del+'</div>';
  }).join('');
  return '<div class="form-card">'
    +'<div class="form-title">Nueva sesion &mdash; Musculatura</div>'
    +'<div class="label">Ejercicio</div><div class="pills">'+exPills+'</div>'
    +'<div class="label">Barra</div><div class="pills">'+barPills+'</div>'
    +'<label class="check-row"><input type="checkbox" '+(f.useAdjusters?'checked':'')+' onchange="fset(\'useAdjusters\',this.checked)" />Ajustadores (+'+S.cfg.adjusterWeight+' lbs)</label>'
    +'<div class="label">Peso en discos anadido</div>'
    +'<div class="input-row" style="margin-bottom:16px">'
    +'<button class="btn-round" onclick="adjW(-5)">&#x2212;</button>'
    +'<input class="weight-val" type="number" id="added-w" value="'+f.addedWeight+'" min="0" step="5" onchange="fset(\'addedWeight\',Math.max(0,Number(this.value)))" />'
    +'<button class="btn-round" onclick="adjW(5)">+</button>'
    +'<span class="unit">lbs</span></div>'
    +'<div class="weight-total"><span style="color:#666;font-size:13px">Peso total: </span><span class="weight-total-num" id="tw">'+total+'</span><span style="color:#666;font-size:13px"> lbs</span></div>'
    +'<div class="label">Series y repeticiones</div>'
    +'<div id="sets-wrap">'+sets+'</div>'
    +'<button class="btn-dashed" onclick="addSet()">+ Anadir serie</button>'
    +'<div style="display:flex;gap:10px"><button class="btn-save" onclick="doSave()">Guardar</button><button class="btn-cancel" onclick="cancelForm()">Cancelar</button></div>'
    +'</div>';
}

function buildCrdForm() {
  var f=S.form;
  var pills=CARDIOS.map(function(c){
    return '<button class="pill green'+(f.cardioId===c.id?' active':'')+'" onclick="fset(\'cardioId\',\''+c.id+'\')">'+esc(c.icon)+' '+esc(c.name)+'</button>';
  }).join('');
  return '<div class="form-card">'
    +'<div class="form-title">Nueva sesion &mdash; Cardio</div>'
    +'<div class="label">Actividad</div><div class="pills">'+pills+'</div>'
    +'<div class="grid2">'
    +'<div><div class="label">Duracion (min)</div><input class="input" type="number" value="'+f.duration+'" min="1" onchange="fset(\'duration\',Number(this.value))" /></div>'
    +'<div><div class="label">Distancia (km)</div><input class="input" type="text" value="'+esc(f.distance)+'" placeholder="&mdash;" onchange="fset(\'distance\',this.value)" /></div>'
    +'</div>'
    +'<div class="label">Notas</div>'
    +'<textarea class="input" rows="3" placeholder="Observaciones opcionales..." onchange="fset(\'notes\',this.value)" style="margin-bottom:16px">'+esc(f.notes)+'</textarea>'
    +'<div style="display:flex;gap:10px"><button class="btn-save" style="background:#2d5a2d;color:#7ec87e" onclick="doSave()">Guardar</button><button class="btn-cancel" onclick="cancelForm()">Cancelar</button></div>'
    +'</div>';
}

function shiftDate(d) { var dt=new Date(S.date); dt.setDate(dt.getDate()+d); setDate(dt.toISOString().slice(0,10)); }
function setDate(d) { S.date=d; S.adding=null; S.form=null; S.openCard=null; renderLog(); }

function toggleCard(id) {
  S.openCard=S.openCard===id?null:id;
  var day=S.sessions.filter(function(s){ return s.date===S.date; });
  document.getElementById('sessions-list').innerHTML=
    day.length===0&&!S.adding?'<div class="empty">Sin sesiones para este dia</div>':day.map(buildCard).join('');
}

function showForm() {
  document.getElementById('form-area').innerHTML=S.adding==='strength'?buildStrForm():buildCrdForm();
  var ar=document.querySelector('.add-row'); if(ar) ar.style.display='none';
}

function openStr() { S.form={type:'strength',exerciseId:'bench',barId:S.cfg.bars[0]&&S.cfg.bars[0].id,useAdjusters:false,addedWeight:0,sets:[{reps:5}]}; S.adding='strength'; showForm(); }
function openCrd() { S.form={type:'cardio',cardioId:'swim',duration:30,distance:'',notes:''}; S.adding='cardio'; showForm(); }
function cancelForm() { S.adding=null; S.form=null; renderLog(); }

function fset(key,val) {
  S.form[key]=val;
  if(key==='exerciseId'||key==='cardioId'||key==='barId'||key==='useAdjusters') { showForm(); return; }
}
function adjW(d) {
  S.form.addedWeight=Math.max(0,(S.form.addedWeight||0)+d);
  var inp=document.getElementById('added-w'); if(inp) inp.value=S.form.addedWeight;
  var tw=document.getElementById('tw'); if(tw) tw.textContent=calcTotal(S.form);
}
function adjReps(i,d) {
  S.form.sets[i].reps=Math.max(1,S.form.sets[i].reps+d);
  var el=document.getElementById('reps-'+i); if(el) el.textContent=S.form.sets[i].reps;
}
function addSet() { S.form.sets.push({reps:S.form.sets[S.form.sets.length-1]?S.form.sets[S.form.sets.length-1].reps:5}); showForm(); }
function removeSet(i) { S.form.sets.splice(i,1); showForm(); }

async function doSave() {
  var f=S.form;
  var snap=JSON.parse(JSON.stringify(f));
  if(f.type==='strength') snap._totalWeight=calcTotal(f);
  var entry=Object.assign({id:uid(),date:S.date},snap);
  S.sessions.unshift(entry);
  S.adding=null; S.form=null;
  renderLog();
  toast('Guardando...');
  try {
    await pushSession(entry);
    toast('Guardado');
  } catch(e) {
    console.error('save error',e);
    toast('Sin conexion, guardado local');
  }
}

async function doDelete(id) {
  S.sessions=S.sessions.filter(function(s){ return s.id!==id; });
  if(S.openCard===id) S.openCard=null;
  var day=S.sessions.filter(function(s){ return s.date===S.date; });
  document.getElementById('sessions-list').innerHTML=
    day.length===0&&!S.adding?'<div class="empty">Sin sesiones para este dia</div>':day.map(buildCard).join('');
  toast('Eliminado');
  try { await sbDel('sessions','id=eq.'+id); } catch(e){ console.error(e); }
}

// PROGRESS
function renderProgress() { document.getElementById('tab-progress').innerHTML=buildProgress(); }
function buildProgress() {
  var v=S.progView, ex=S.progEx;
  var strList=S.sessions.filter(function(s){ return s.type==='strength'&&s.exerciseId===ex; })
    .sort(function(a,b){ return b.date.localeCompare(a.date); }).slice(0,20);
  var crdList=S.sessions.filter(function(s){ return s.type==='cardio'; })
    .sort(function(a,b){ return b.date.localeCompare(a.date); });
  var exPills=EXERCISES.map(function(e){
    return '<button class="pill'+(ex===e.id?' active':'')+'" onclick="setProgEx(\''+e.id+'\')">'+esc(e.icon)+' '+esc(e.name)+'</button>';
  }).join('');
  var strContent='';
  if(strList.length===0){ strContent='<div class="empty">Sin datos para este ejercicio</div>'; }
  else {
    var chartData=strList.map(function(s){ return {date:s.date,val:s._totalWeight||0}; }).reverse();
    strContent=buildChart(chartData)+strList.map(function(s){
      return '<div class="prog-row"><div><div class="prog-date">'+fmtDate(s.date)+'</div><div class="prog-sub">'+((s.sets||[]).length)+' series</div></div><div class="prog-val" style="color:#c8a96e">'+(s._totalWeight||0)+' lbs</div></div>';
    }).join('');
  }
  var crdContent=crdList.length===0?'<div class="empty">Sin sesiones de cardio aun</div>':crdList.map(function(s){
    var ct=ctInfo(s.cardioId);
    return '<div class="prog-row"><div><div class="prog-date">'+fmtDate(s.date)+'</div><div class="prog-sub">'+esc(ct.icon||'')+' '+esc(ct.name||'')+(s.distance?' &middot; '+esc(s.distance)+' km':'')+'</div></div><div class="prog-val" style="color:#7ec87e">'+s.duration+' min</div></div>';
  }).join('');
  return '<div class="pills">'
    +'<button class="pill'+(v==='strength'?' active':'')+'" onclick="setProgView(\'strength\')">Musculatura</button>'
    +'<button class="pill'+(v==='cardio'?' active':'')+'" onclick="setProgView(\'cardio\')">Cardio</button>'
    +'</div>'
    +(v==='strength'?'<div class="label">Ejercicio</div><div class="pills">'+exPills+'</div>'+strContent:'')
    +(v==='cardio'?crdContent:'');
}
function buildChart(data) {
  if(data.length<2) return '';
  var vals=data.map(function(d){ return d.val; });
  var mn=Math.min.apply(null,vals), mx=Math.max.apply(null,vals), rng=mx-mn||1;
  var W=320,H=90;
  function px(i){ return (i/(data.length-1))*(W-20)+10; }
  function py(v){ return H-16-((v-mn)/rng)*(H-32); }
  var path=data.map(function(d,i){ return (i===0?'M':'L')+px(i)+','+py(d.val); }).join(' ');
  var area=path+' L'+px(data.length-1)+','+(H-16)+' L'+px(0)+','+(H-16)+' Z';
  var dots=data.map(function(d,i){ return '<circle cx="'+px(i)+'" cy="'+py(d.val)+'" r="3" fill="#c8a96e"/>'; }).join('');
  var grids=[0,.5,1].map(function(t){ return '<line x1="10" y1="'+py(mn+t*rng)+'" x2="'+(W-10)+'" y2="'+py(mn+t*rng)+'" stroke="#1e1e1e" stroke-width="1"/>'; }).join('');
  return '<div class="chart-wrap"><div class="chart-lbl">Peso total (lbs)</div>'
    +'<svg width="100%" viewBox="0 0 '+W+' '+H+'" style="overflow:visible">'
    +grids
    +'<path d="'+area+'" fill="#c8a96e18"/>'
    +'<path d="'+path+'" stroke="#c8a96e" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>'
    +dots
    +'<text x="10" y="'+(H-2)+'" font-size="9" fill="#444">'+(data[0]&&data[0].date?data[0].date.slice(5):'')+'</text>'
    +'<text x="'+(W-10)+'" y="'+(H-2)+'" font-size="9" fill="#444" text-anchor="end">'+(data[data.length-1]&&data[data.length-1].date?data[data.length-1].date.slice(5):'')+'</text>'
    +'</svg></div>';
}
function setProgView(v){ S.progView=v; renderProgress(); }
function setProgEx(id){ S.progEx=id; renderProgress(); }

// SETTINGS
function renderSettings() { document.getElementById('tab-settings').innerHTML=buildSettings(); }
function buildSettings() {
  var bars=S.cfg.bars.map(function(b){
    return '<div class="bar-row"><div class="bar-inner">'
      +'<input class="input" style="flex:1" value="'+esc(b.name)+'" onchange="updBarName(\''+b.id+'\',this.value)" />'
      +'<div style="display:flex;align-items:center;gap:6px;flex-shrink:0">'
      +'<input class="bar-w" type="number" value="'+b.weight+'" onchange="updBarW(\''+b.id+'\',this.value)" />'
      +'<span class="unit">lbs</span></div></div></div>';
  }).join('');
  return '<div class="section-title">Barras</div>'+bars
    +'<div class="section-title" style="margin-top:24px">Ajustadores</div>'
    +'<div class="bar-row"><div class="bar-inner">'
    +'<span style="color:#aaa;font-size:14px;flex:1">Peso total de ajustadores</span>'
    +'<div style="display:flex;align-items:center;gap:6px;flex-shrink:0">'
    +'<input class="bar-w" type="number" value="'+S.cfg.adjusterWeight+'" onchange="updAdj(this.value)" />'
    +'<span class="unit">lbs</span></div></div></div>'
    +'<div style="margin-top:20px"><button class="btn-save" onclick="doSaveCfg()">Guardar ajustes</button></div>'
    +'<div class="section-title" style="margin-top:32px">Acerca de</div>'
    +'<p class="about-text">Iron Log &middot; Tracker personal.<br>Datos guardados en Supabase.</p>';
}
function updBarName(id,v){ S.cfg.bars.find(function(b){ return b.id===id; }).name=v; }
function updBarW(id,v){ S.cfg.bars.find(function(b){ return b.id===id; }).weight=Number(v); }
function updAdj(v){ S.cfg.adjusterWeight=Number(v); }
async function doSaveCfg() {
  try { await pushCfg(S.cfg); toast('Ajustes guardados'); }
  catch(e){ console.error(e); toast('Error al guardar'); }
}

// INIT
(async function() {
  try {
    var results = await Promise.all([fetchAll(), fetchCfg()]);
    var sessions=results[0], cfg=results[1];
    S.sessions=sessions||[];
    if(cfg&&cfg.bars) S.cfg=cfg;
  } catch(e) {
    console.error('Init error:',e);
    S.sessions=[];
  }
  var ls=document.getElementById('loading-screen');
  ls.classList.add('hide');
  setTimeout(function(){ ls.style.display='none'; },400);
  var app=document.getElementById('app');
  app.style.display='flex';
  app.style.flexDirection='column';
  renderLog();
})();
</script>

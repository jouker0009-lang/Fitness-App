<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="Iron Log"/>
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate"/>
  <meta http-equiv="Pragma" content="no-cache"/>
  <meta http-equiv="Expires" content="0"/>
  <title>Iron Log</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html,body{height:100%;background:#0d0d0d;color:#f0e6d3;font-family:"DM Sans",sans-serif}
    input[type=number]::-webkit-inner-spin-button{-webkit-appearance:none}
    ::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:#111}::-webkit-scrollbar-thumb{background:#2a2a2a;border-radius:4px}
    @keyframes spin{to{transform:rotate(360deg)}}
    @keyframes sd{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}
    @keyframes ti{from{opacity:0;transform:translateX(-50%) translateY(8px)}to{opacity:1;transform:translateX(-50%) translateY(0)}}
    #app{max-width:520px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column}
    header{display:flex;justify-content:space-between;align-items:center;padding:16px 20px 12px;border-bottom:1px solid #1a1a1a;position:sticky;top:0;background:#0d0d0d;z-index:10;flex-wrap:wrap;gap:8px}
    .logo{font-family:"Playfair Display",serif;font-size:22px;letter-spacing:1px;color:#c8a96e}
    nav{display:flex;gap:4px;flex-wrap:wrap}
    .nb{background:transparent;border:none;color:#666;font-family:inherit;font-size:13px;padding:6px 12px;border-radius:8px;cursor:pointer;border-bottom:2px solid transparent;transition:all .2s}
    .nb.on{color:#c8a96e;background:#c8a96e18;border-bottom-color:#c8a96e}
    main{flex:1;overflow:auto;padding-bottom:80px}
    .tab{padding:20px 20px 0;display:none}.tab.on{display:block}
    .card{background:#111;border:1px solid #1e1e1e;border-radius:12px;padding:14px 16px;margin-bottom:10px}
    .fcard{background:#111;border:1px solid #2a2a2a;border-radius:14px;padding:20px 18px;margin-top:16px;animation:sd .2s ease}
    .ftitle{color:#c8a96e;font-size:13px;letter-spacing:.5px;text-transform:uppercase;margin-bottom:20px}
    .lbl{color:#666;font-size:11px;letter-spacing:.5px;text-transform:uppercase;margin-bottom:8px}
    .stitle{color:#c8a96e;font-size:13px;letter-spacing:1px;text-transform:uppercase;margin-bottom:12px}
    .pills{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px}
    .pill{padding:6px 14px;border-radius:99px;border:1.5px solid #333;background:transparent;color:#999;font-size:13px;font-family:inherit;cursor:pointer;transition:all .2s;white-space:nowrap}
    .pill.on{border-color:#c8a96e;background:#c8a96e22;color:#c8a96e}
    .pill.gon{border-color:#7ec87e;background:#7ec87e22;color:#7ec87e}
    .inp{background:#1a1a1a;border:1px solid #2a2a2a;color:#f0e6d3;border-radius:8px;padding:9px 12px;font-size:14px;font-family:inherit;width:100%}
    textarea.inp{resize:vertical}
    .wval{width:72px;text-align:center;background:#1a1a1a;border:1px solid #333;color:#f0e6d3;border-radius:8px;padding:8px 4px;font-size:18px;font-family:inherit}
    .unit{color:#555;font-size:13px}
    .irow{display:flex;align-items:center;gap:8px}
    .br{width:36px;height:36px;border-radius:8px;border:1px solid #333;background:#222;color:#c8a96e;font-size:18px;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;font-family:inherit;flex-shrink:0}
    .bsave{padding:12px 28px;border-radius:10px;border:none;background:#c8a96e;color:#0d0d0d;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit}
    .bcancel{padding:12px 20px;border-radius:10px;border:1px solid #2a2a2a;background:transparent;color:#666;font-size:14px;cursor:pointer;font-family:inherit}
    .badd-s{flex:1;padding:14px;border-radius:12px;border:1px dashed #3a3020;background:#1a1505;color:#c8a96e;font-size:14px;cursor:pointer;font-family:inherit}
    .badd-c{flex:1;padding:14px;border-radius:12px;border:1px dashed #1a3a1a;background:#0d1f0d;color:#7ec87e;font-size:14px;cursor:pointer;font-family:inherit}
    .bdash{background:none;border:1px dashed #333;color:#555;border-radius:8px;padding:6px 14px;font-size:13px;cursor:pointer;font-family:inherit;margin-bottom:20px}
    .bdel{background:none;border:none;color:#c44;cursor:pointer;font-size:14px;padding:4px}
    .bedit{background:none;border:none;color:#888;cursor:pointer;font-size:14px;padding:4px}
    .btoday{margin-left:auto;padding:6px 14px;border-radius:8px;border:1px solid #2a2a2a;background:transparent;color:#666;font-size:12px;cursor:pointer;font-family:inherit}
    .dnav{display:flex;align-items:center;gap:10px;margin-bottom:24px;flex-wrap:wrap}
    .dnav input[type=date]{background:#1a1a1a;border:1px solid #333;color:#f0e6d3;padding:8px 14px;border-radius:10px;font-size:14px;font-family:inherit}
    .sh{display:flex;justify-content:space-between;align-items:center;cursor:pointer}
    .sm{display:flex;align-items:center;gap:10px}
    .si{font-size:22px}.sn{color:#f0e6d3;font-weight:500;font-size:15px}
    .sg{color:#c8a96e;font-size:13px}.sv{color:#7ec87e;font-size:13px}
    .sa{display:flex;gap:4px;align-items:center}
    .sd2{margin-top:12px;padding-top:12px;border-top:1px solid #222;font-size:13px;color:#888;animation:sd .2s ease}
    .chip{display:inline-block;background:#1a1a1a;border:1px solid #2a2a2a;border-radius:6px;padding:3px 10px;margin-right:6px;margin-bottom:4px;font-size:12px}
    .lsh{background:#0f0f0f;border:1px solid #2a2a2a;border-radius:10px;padding:10px 12px;margin-top:-8px;margin-bottom:14px}
    .lsh-d{color:#555;font-size:10px;text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px}
    .lsh-r{display:flex;flex-wrap:wrap;gap:6px}
    .lsh-c{background:#1a1a1a;border:1px solid #2a2a2a;border-radius:6px;padding:3px 8px;font-size:12px;color:#aaa}
    .lsh-t{background:#c8a96e18;border:1px solid #c8a96e44;border-radius:6px;padding:3px 8px;font-size:12px;color:#c8a96e;font-weight:600}
    .lsh-s{color:#555;font-size:11px;margin-top:6px}
    .lsh-n{color:#444;font-size:12px;margin-top:-8px;margin-bottom:14px}
    .wtbox{background:#1a1a1a;border:1px solid #2a2a2a;border-radius:10px;padding:12px 16px;margin-bottom:20px}
    .wtnum{color:#c8a96e;font-size:22px;font-weight:600}
    .setrow{display:flex;align-items:center;gap:10px;margin-bottom:8px}
    .setlbl{color:#555;font-size:13px;width:56px}
    .setreps{color:#f0e6d3;font-size:16px;width:28px;text-align:center}
    .g2{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px}
    .g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:16px}
    .empty{color:#444;text-align:center;padding:40px 0;font-size:14px}
    .prow{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid #1a1a1a}
    .pd{color:#888;font-size:13px}.ps{color:#555;font-size:12px}.pv{font-size:17px;font-weight:600}
    .chwrap{background:#111;border-radius:12px;padding:16px 8px 8px;border:1px solid #1e1e1e;margin-bottom:20px}
    .chlbl{color:#555;font-size:11px;margin-bottom:4px;padding-left:8px}
    .brow{background:#111;border:1px solid #1e1e1e;border-radius:12px;padding:14px 16px;margin-bottom:10px}
    .binn{display:flex;justify-content:space-between;align-items:center;gap:12px}
    .bw{background:#1a1a1a;border:1px solid #2a2a2a;color:#f0e6d3;border-radius:8px;padding:8px;font-size:14px;font-family:inherit;width:64px;text-align:center}
    .chk{display:flex;align-items:center;gap:8px;margin-bottom:16px;cursor:pointer;color:#aaa;font-size:14px}
    .chk input{accent-color:#c8a96e;width:16px;height:16px;cursor:pointer}
    .pbar-wrap{background:#1a1a1a;border-radius:99px;height:10px;overflow:hidden;margin:6px 0 14px}
    .pbar-fill{height:100%;border-radius:99px;transition:width .4s ease,background .4s ease}
    .fdbtn{background:#111;border:1px solid #1e1e1e;border-radius:10px;padding:10px 12px;cursor:pointer;font-family:inherit;text-align:left;width:100%;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center}
    .fdname{color:#f0e6d3;font-size:14px}.fdmac{color:#666;font-size:12px;margin-top:2px}
    .fdadd{background:#c8a96e22;border:1px solid #c8a96e44;color:#c8a96e;border-radius:8px;padding:4px 10px;font-size:12px;cursor:pointer;white-space:nowrap}
    .meal{display:flex;justify-content:space-between;align-items:center;padding:8px 0;border-bottom:1px solid #1a1a1a}
    .mname{color:#f0e6d3;font-size:13px}.mmac{color:#666;font-size:12px}
    .sug{background:#1a1a0a;border:1px solid #3a3020;border-radius:12px;padding:14px 16px;margin-bottom:16px}
    .sugt{color:#c8a96e;font-size:12px;text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px}
    .sugb{color:#aaa;font-size:13px;line-height:1.6}
    .sbox{background:#111;border:1px solid #1e1e1e;border-radius:12px;padding:14px 16px;text-align:center}
    .snum{font-size:24px;font-weight:600}.slbl{color:#666;font-size:11px;text-transform:uppercase;letter-spacing:.5px;margin-top:2px}
    .crow{display:flex;gap:8px;margin-bottom:8px;flex-wrap:wrap}
    .crow input{background:#1a1a1a;border:1px solid #2a2a2a;color:#f0e6d3;border-radius:8px;padding:8px 10px;font-size:13px;font-family:inherit}
    #ls{position:fixed;inset:0;background:#0d0d0d;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:16px;z-index:100;transition:opacity .4s ease}
    #ls.hide{opacity:0;pointer-events:none}
    .ll{font-family:"Playfair Display",serif;font-size:28px;color:#c8a96e;letter-spacing:2px}
    .lsub{color:#444;font-size:13px}
    .sp{width:24px;height:24px;border:2px solid #2a2a2a;border-top-color:#c8a96e;border-radius:50%;animation:spin .8s linear infinite}
    #toast{position:fixed;bottom:32px;left:50%;transform:translateX(-50%);background:#c8a96e;color:#0d0d0d;padding:10px 24px;border-radius:99px;font-size:14px;font-weight:600;z-index:999;animation:ti .2s ease;display:none;white-space:nowrap}
  </style>
</head>
<body>
<div id="ls"><div class="ll">IRON LOG</div><div class="sp"></div><div class="lsub">Cargando...</div></div>
<div id="app" style="display:none">
  <header>
    <span class="logo">IRON LOG</span>
    <button id="savebtn" onclick="manualSave()" title="Guardar" style="background:none;border:1px solid #2a2a2a;color:#666;border-radius:8px;padding:5px 10px;cursor:pointer;font-size:16px;font-family:inherit;transition:all .3s">💾</button>
    <nav>
      <button class="nb on"  id="nb-log"       onclick="setTab('log')">Registro</button>
      <button class="nb"     id="nb-progress"  onclick="setTab('progress')">Progreso</button>
      <button class="nb"     id="nb-nutrition" onclick="setTab('nutrition')">Nutricion</button>
      <button class="nb"     id="nb-settings"  onclick="setTab('settings')">Ajustes</button>
    </nav>
  </header>
  <main>
    <div id="tab-log"       class="tab on"></div>
    <div id="tab-progress"  class="tab"></div>
    <div id="tab-nutrition" class="tab"></div>
    <div id="tab-settings"  class="tab"></div>
  </main>
</div>
<div id="toast"></div>
<script>
var SB='https://mzimwwqhioptlccvonrl.supabase.co/rest/v1';
var SK='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im16aW13d3FoaW9wdGxjY3ZvbnJsIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzczMzg4MzksImV4cCI6MjA5MjkxNDgzOX0.qUQTv_zVpscjP8nMyGWDZTEgGGIU9EJq_y3_bOsU9PE';
var H={'apikey':SK,'Authorization':'Bearer '+SK,'Content-Type':'application/json'};
async function sbGet(t,q){var r=await fetch(SB+'/'+t+'?'+(q||''),{headers:H});if(!r.ok)throw new Error(await r.text());return r.json();}
async function sbPost(t,body,pref){var r=await fetch(SB+'/'+t,{method:'POST',headers:Object.assign({},H,{'Prefer':pref||'return=minimal'}),body:JSON.stringify(body)});if(!r.ok)throw new Error(await r.text());}
async function sbDel(t,q){var r=await fetch(SB+'/'+t+'?'+(q||''),{method:'DELETE',headers:H});if(!r.ok)throw new Error(await r.text());}

var BASE_EX=[
  {id:'bench',    name:'Press de Banca',      icon:'🏋️'},
  {id:'military', name:'Press Militar',        icon:'🪖'},
  {id:'squat',    name:'Sentadillas',          icon:'🦵'},
  {id:'deadlift', name:'Peso Muerto',          icon:'⚡'},
  {id:'pullup',   name:'Dominadas / Pull-ups', icon:'🔱'},
];
var BASE_INST=[
  {id:'olympic',    name:'Olimpica',     weight:45, hasWeight:true},
  {id:'z',          name:'Barra Z',      weight:25, hasWeight:true},
  {id:'thin',       name:'Delgada',      weight:15, hasWeight:true},
  {id:'dumbbell',   name:'Mancuernas',   weight:0,  hasWeight:true},
  {id:'kettlebell', name:'Kettlebell',   weight:0,  hasWeight:true},
  {id:'bodyweight', name:'Sin peso',     weight:0,  hasWeight:false},
];
var CARDIOS=[
  {id:'swim',name:'Natacion',  icon:'🏊'},
  {id:'bike',name:'Bicicleta', icon:'🚴'},
  {id:'run', name:'Correr',    icon:'🏃'},
  {id:'hike',name:'Senderismo',icon:'🥾'},
];
var FOODS=[
  {name:'Huevo entero',       por:'1 unidad',   p:6, k:70},
  {name:'Leche de soya',      por:'250ml',       p:8, k:100},
  {name:'Queso blanco',       por:'30g',         p:7, k:90},
  {name:'Yogur griego',       por:'150g',        p:15,k:130},
  {name:'Atun en lata',       por:'1 lata 140g', p:25,k:130},
  {name:'Pechuga de pollo',   por:'100g',        p:31,k:165},
  {name:'Carne de res magra', por:'100g',        p:26,k:180},
  {name:'Frijoles cocidos',   por:'100g',        p:8, k:130},
  {name:'Lentejas cocidas',   por:'100g',        p:9, k:115},
  {name:'Avena seca',         por:'80g',         p:10,k:300},
  {name:'Arroz cocido',       por:'150g',        p:3, k:195},
  {name:'Banano',             por:'1 mediano',   p:1, k:105},
  {name:'Manzana',            por:'1 mediana',   p:0, k:78},
  {name:'Pan integral',       por:'1 rebanada',  p:3, k:80},
  {name:'Semillas de chia',   por:'15g',         p:3, k:72},
];
var DEF={bars:[{id:'olympic',name:'Olimpica',weight:45},{id:'z',name:'Barra Z',weight:25},{id:'thin',name:'Delgada',weight:15}],adjusterWeight:20,customEx:[],customInst:[],nutWeight:62.3,meals:[]};
var D={sessions:[],cfg:JSON.parse(JSON.stringify(DEF)),date:crDate(),tab:'log',adding:null,form:null,openCard:null,progView:'strength',progEx:'bench'};

function crDate(){return new Date().toLocaleDateString('en-CA',{timeZone:'America/Costa_Rica'});}
function fmtD(iso){var p=iso.split('-');return p[2]+'/'+p[1]+'/'+p[0];}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,5);}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function allEx(){return BASE_EX.concat(D.cfg.customEx||[]);}
function allInst(){return BASE_INST.concat(D.cfg.customInst||[]);}
function barById(id){return (D.cfg.bars||[]).find(function(b){return b.id===id;})||{};}
function instById(id){return allInst().find(function(i){return i.id===id;})||{};}
function calcTot(f){
  var inst=instById(f.instId||f.barId||'');
  if(!inst.id) inst=barById(f.barId||'');
  var base=inst.hasWeight!==false?(inst.weight||0):0;
  var adj=inst.hasWeight!==false&&f.useAdj?(D.cfg.adjusterWeight||0):0;
  return base+adj+(f.addW||0);
}
function lastSess(exId){
  return D.sessions.filter(function(s){return s.type==='strength'&&s.exerciseId===exId;})
    .sort(function(a,b){return b.date.localeCompare(a.date);})[0]||null;
}
function todayMeals(){return (D.cfg.meals||[]).filter(function(m){return m.date===crDate();});}
function mealTot(){return todayMeals().reduce(function(a,m){a.p+=m.p;a.k+=m.k;return a;},{p:0,k:0});}
function nutG(){var w=D.cfg.nutWeight||62.3,tmb=(10*w)+(6.25*170)-(5*27)+5,tdee=tmb*1.375;return{kcal:Math.round(tdee+200),prot:Math.round(w*1.8),tmb:Math.round(tmb),tdee:Math.round(tdee)};}
function bcolor(p){return p<0.5?'#c84a4a':p<0.85?'#c8a96e':p<=1.05?'#4ac87e':'#c84a4a';}

var _tt;
function toast(msg){var t=document.getElementById('toast');t.textContent=msg;t.style.display='block';clearTimeout(_tt);_tt=setTimeout(function(){t.style.display='none';},2500);}

function rowToSess(r){return Object.assign({id:r.id,date:r.date,type:r.type},r.data||{});}
async function loadAll(){return((await sbGet('sessions','order=date.desc,created_at.desc'))||[]).map(rowToSess);}
async function loadCfg(){var rows=await sbGet('settings','id=eq.default');return rows&&rows.length?rows[0].data:null;}
async function pushSess(s){var id=s.id,date=s.date,type=s.type,data=Object.assign({},s);delete data.id;delete data.date;delete data.type;await sbPost('sessions',{id:id,date:date,type:type,data:data});}
async function pushCfg(){await sbPost('settings',{id:'default',data:D.cfg},'resolution=merge-duplicates,return=minimal');}

function setTab(name){
  D.tab=name;
  document.querySelectorAll('.nb').forEach(function(b){b.classList.remove('on');});
  document.querySelectorAll('.tab').forEach(function(t){t.classList.remove('on');});
  document.getElementById('nb-'+name).classList.add('on');
  document.getElementById('tab-'+name).classList.add('on');
  if(name==='log')rLog();if(name==='progress')rProg();if(name==='nutrition')rNut();if(name==='settings')rSet();
}

// ── LOG ───────────────────────────────────────────────────────────────────────
function rLog(){document.getElementById('tab-log').innerHTML=bLog();}
function bLog(){
  var day=D.sessions.filter(function(s){return s.date===D.date;});
  var cards=day.length===0&&!D.adding?'<div class="empty">Sin sesiones para este dia</div>':day.map(bSCard).join('');
  var form=D.adding==='strength'?bSForm():D.adding==='cardio'?bCForm():'';
  var addRow=!D.adding?'<div style="display:flex;gap:12px;margin-top:24px"><button class="badd-s" onclick="openStr()">+ Musculatura</button><button class="badd-c" onclick="openCrd()">+ Cardio</button></div>':'';
  return '<div class="dnav"><button class="br" onclick="shiftD(-1)">&#x2039;</button><input type="date" value="'+D.date+'" onchange="setD(this.value)"/><button class="br" onclick="shiftD(1)">&#x203A;</button><button class="btoday" onclick="setD(crDate())">Hoy</button></div><div id="slist">'+cards+'</div><div id="farea">'+form+'</div>'+addRow;
}

function bSCard(s){
  var isS=s.type==='strength';
  var exList=isS?allEx():CARDIOS;
  var ex=exList.find(function(e){return e.id===(isS?s.exerciseId:s.cardioId);})||{};
  if(isS&&!ex.name&&s._exName){ex={name:s._exName,icon:s._exIcon||'💪'};}
  var inst=isS?instById(s.instId||s.barId||''):{};
  var instName=s._instName||inst.name||'';
  var open=D.openCard===s.id;
  var sub=isS?'<div class="sg">'+(s._totalWeight||0)+' lbs totales</div>':'<div class="sv">'+s.duration+' min'+(s.dist?' &middot; '+esc(s.dist)+' km':'')+'</div>';
  var det='';
  if(open&&isS){
    var chips=(s.sets||[]).map(function(st,i){return '<span class="chip">S'+(i+1)+': '+st.reps+'r</span>';}).join('');
    det='<div class="sd2">'
      +(instName?'<div>'+esc(instName)+(s.useAdj?' + Ajustadores':'')+'</div>':'')
      +(s.addW?'<div style="margin-top:4px">Discos: '+s.addW+' lbs</div>':'')
      +'<div style="margin-top:8px">'+chips+'</div></div>';
  }
  if(open&&!isS&&s.notes){det='<div class="sd2">'+esc(s.notes)+'</div>';}
  return '<div class="card">'
    +'<div class="sh" data-id="'+esc(s.id)+'" onclick="togCard(this.dataset.id)">'
    +'<div class="sm"><span class="si">'+esc(ex.icon||'💪')+'</span>'
    +'<div><div class="sn">'+esc(ex.name||'')+'</div>'+sub+'</div></div>'
    +'<div class="sa">'

function adjR(i,d){i=parseInt(i);D.form.sets[i].reps=Math.max(1,D.form.sets[i].reps+d);var e=document.getElementById('rr'+i);if(e)e.textContent=D.form.sets[i].reps;}

async function doSave(){
  var f=D.form;
  var snap=JSON.parse(JSON.stringify(f));
  if(f.type==='strength'){
    snap._totalWeight=calcTot(f);
    var ex=allEx().find(function(e){return e.id===f.exerciseId;})||{};
    snap._exName=ex.name||''; snap._exIcon=ex.icon||'💪';
    var inst=allInst().find(function(i){return i.id===f.instId;})||{};
    snap._instName=inst.name||'';
  }
  if(f._editId){
    var idx=D.sessions.findIndex(function(s){return s.id===f._editId;});
    if(idx>=0){
      var updated=Object.assign({},D.sessions[idx],snap,{id:f._editId,date:f._editDate||D.sessions[idx].date});
      delete updated._editId; delete updated._editDate;
      D.sessions[idx]=updated;
      D.adding=null;D.form=null;rLog();toast('Sesion actualizada');
      try{
        var u=updated,ud=Object.assign({},u);delete ud.id;delete ud.date;delete ud.type;
        await sbDel('sessions','id=eq.'+u.id);
        await sbPost('sessions',{id:u.id,date:u.date,type:u.type,data:ud});
      }catch(e){console.error(e);}
    }
    return;
  }
  var entry=Object.assign({id:uid(),date:D.date},snap);
  delete entry._editId;delete entry._editDate;
  D.sessions.unshift(entry);D.adding=null;D.form=null;rLog();toast('Guardado');
  try{
    var ed=Object.assign({},entry);delete ed.id;delete ed.date;delete ed.type;
    await sbPost('sessions',{id:entry.id,date:entry.date,type:entry.type,data:ed});
  }catch(e){console.error(e);}
}

async function delSess(id){
  D.sessions=D.sessions.filter(function(s){return s.id!==id;});D.openCard=null;
  var day=D.sessions.filter(function(s){return s.date===D.date;});
  document.getElementById('slist').innerHTML=day.length===0?'<div class="empty">Sin sesiones para este dia</div>':day.map(bSCard).join('');
  toast('Eliminado');try{await sbDel('sessions','id=eq.'+id);}catch(e){console.error(e);}
}

function rProg(){document.getElementById('tab-progress').innerHTML=bProg();}
function bProg(){
  var v=D.progView,ex=D.progEx;
  var sl=D.sessions.filter(function(s){return s.type==='strength'&&s.exerciseId===ex;}).sort(function(a,b){return b.date.localeCompare(a.date);}).slice(0,20);
  var cl=D.sessions.filter(function(s){return s.type==='cardio';}).sort(function(a,b){return b.date.localeCompare(a.date);});
  var exPills=allEx().map(function(e){return '<button class="pill'+(ex===e.id?' on':'')+'" data-id="'+esc(e.id)+'" onclick="setPEx(this.dataset.id)">'+esc(e.icon||'💪')+' '+esc(e.name)+'</button>';}).join('');
  var strC=sl.length===0?'<div class="empty">Sin datos para este ejercicio</div>':
    bChart(sl.map(function(s){return{date:s.date,val:s._totalWeight||0};}).reverse())
    +sl.map(function(s){
      var inst=instById(s.instId||s.barId||'');
      return '<div class="prow"><div><div class="pd">'+fmtD(s.date)+'</div><div class="ps">'+(s._instName||inst.name||'')+(s.addW?' +'+s.addW+'lbs':'')+'</div></div><div class="pv" style="color:#c8a96e">'+(s._totalWeight||0)+' lbs</div></div>';
    }).join('');
  var crdC=cl.length===0?'<div class="empty">Sin sesiones de cardio</div>':cl.map(function(s){var ct=CARDIOS.find(function(c){return c.id===s.cardioId;})||{};return '<div class="prow"><div><div class="pd">'+fmtD(s.date)+'</div><div class="ps">'+esc(ct.icon||'')+' '+esc(ct.name||'')+(s.dist?' &middot; '+esc(s.dist)+' km':'')+'</div></div><div class="pv" style="color:#7ec87e">'+s.duration+' min</div></div>';}).join('');
  return '<div class="pills"><button class="pill'+(v==='strength'?' on':'')+'" onclick="setPV(\"strength\")">Musculatura</button><button class="pill'+(v==='cardio'?' on':'')+'" onclick="setPV(\"cardio\")">Cardio</button></div>'+(v==='strength'?'<div class="lbl">Ejercicio</div><div class="pills">'+exPills+'</div>'+strC:'')+(v==='cardio'?crdC:'');
}
function bChart(data){
  if(data.length<2)return '';
  var vals=data.map(function(d){return d.val;}),mn=Math.min.apply(null,vals),mx=Math.max.apply(null,vals),rng=mx-mn||1;
  var W=320,H=90,px=function(i){return(i/(data.length-1))*(W-20)+10;},py=function(v){return H-16-((v-mn)/rng)*(H-32);};
  var path=data.map(function(d,i){return(i?'L':'M')+px(i)+','+py(d.val);}).join(' ');
  return '<div class="chwrap"><div class="chlbl">Peso total (lbs)</div><svg width="100%" viewBox="0 0 '+W+' '+H+'" style="overflow:visible">'+[0,.5,1].map(function(t){return '<line x1="10" y1="'+py(mn+t*rng)+'" x2="'+(W-10)+'" y2="'+py(mn+t*rng)+'" stroke="#1e1e1e" stroke-width="1"/>';}).join('')+'<path d="'+path+' L'+px(data.length-1)+','+(H-16)+' L'+px(0)+','+(H-16)+' Z" fill="#c8a96e18"/><path d="'+path+'" stroke="#c8a96e" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round"/>'+data.map(function(d,i){return '<circle cx="'+px(i)+'" cy="'+py(d.val)+'" r="3" fill="#c8a96e"/>';}).join('')+'<text x="10" y="'+(H-2)+'" font-size="9" fill="#444">'+data[0].date.slice(5)+'</text><text x="'+(W-10)+'" y="'+(H-2)+'" font-size="9" fill="#444" text-anchor="end">'+data[data.length-1].date.slice(5)+'</text></svg></div>';
}
function setPV(v){D.progView=v;rProg();}
function setPEx(id){D.progEx=id;rProg();}

  var mealsH=ms.length===0?'<div class="empty" style="padding:16px 0">Sin comidas hoy</div>':ms.slice().reverse().map(function(m){return '<div class="meal"><div><div class="mname">'+esc(m.name)+'</div><div class="mmac">'+m.p+'g prot &middot; '+m.k+' kcal</div></div><button class="bdel" data-id="'+esc(m.id)+'" onclick="delMeal(this.dataset.id)">&#x2715;</button></div>';}).join('');
  var foodH=FOODS.map(function(f,i){return '<button class="fdbtn" data-i="'+i+'" onclick="addFoodIdx(this.dataset.i)"><div><div class="fdname">'+esc(f.name)+'</div><div class="fdmac">'+f.por+' &middot; '+f.p+'g prot &middot; '+f.k+' kcal</div></div><span class="fdadd">+ Agregar</span></button>';}).join('');
  return '<div class="g3"><div class="sbox"><div class="snum" style="color:#c8a96e">'+tot.p+'g</div><div class="slbl">Proteina</div></div><div class="sbox"><div class="snum" style="color:#7ec87e">'+tot.k+'</div><div class="slbl">Kcal</div></div><div class="sbox"><div class="snum" style="color:#aaa">'+ms.length+'</div><div class="slbl">Comidas</div></div></div><div class="lbl">Proteina '+tot.p+'g / '+g.prot+'g</div><div class="pbar-wrap"><div class="pbar-fill" style="width:'+(pp*100)+'%;background:'+bcolor(tot.p/g.prot)+'"></div></div><div class="lbl">Calorias '+tot.k+' / '+g.kcal+' kcal</div><div class="pbar-wrap"><div class="pbar-fill" style="width:'+(kp*100)+'%;background:'+bcolor(tot.k/g.kcal)+'"></div></div><div class="sug"><div class="sugt">Sugerencia</div><div class="sugb">'+sug+'</div></div><div class="stitle">Hoy</div><div class="card" style="margin-bottom:16px">'+mealsH+'</div><div class="stitle">Agregar personalizado</div><div class="crow"><input style="flex:2;min-width:120px" placeholder="Nombre" id="cnm"/><input style="width:64px" type="number" placeholder="Prot g" id="cpp"/><input style="width:72px" type="number" placeholder="Kcal" id="ck"/><button class="bsave" style="padding:8px 14px;font-size:13px" onclick="addCustomFood()">+</button></div><div class="stitle" style="margin-top:8px">Tu peso</div><div style="display:flex;gap:8px;align-items:center;margin-bottom:8px"><input class="inp" style="width:100px" type="number" step="0.1" value="'+D.cfg.nutWeight+'" id="nwi"/><span class="unit">kg</span><button class="bsave" style="padding:8px 16px;font-size:13px" onclick="updNutW()">Actualizar</button></div><div style="color:#444;font-size:12px;margin-bottom:20px">TMB: '+g.tmb+' &middot; TDEE: '+g.tdee+' &middot; Obj: '+g.kcal+' kcal / '+g.prot+'g</div><div class="stitle">Alimentos</div>'+foodH;
}

    +'<input class="inp" style="flex:1;min-width:140px" id="cen" placeholder="Nombre del ejercicio"/>'
    +'<input class="inp" style="width:60px" id="cei" placeholder="Icono"/>'
    +'<button class="bsave" style="padding:10px 14px;font-size:13px" onclick="addEx()">+ Agregar</button>'
    +'</div>'
    +'<div class="stitle" style="margin-top:32px">Acerca de</div>'
    +'<p style="color:#444;font-size:13px;line-height:1.7;margin-top:8px">Iron Log &middot; Tracker personal. Datos en Supabase.</p>';
}
function updInstW(id,v){var i=BASE_INST.find(function(x){return x.id===id;});if(i)i.weight=Number(v);}
function updBN(id,v){(D.cfg.bars||[]).forEach(function(b){if(b.id===id)b.name=v;});}
function updBW(id,v){(D.cfg.bars||[]).forEach(function(b){if(b.id===id)b.weight=Number(v);});}
function addInst(){
  var n=(document.getElementById('cin')||{}).value||'';
  var w=parseFloat((document.getElementById('ciw')||{}).value)||0;
  var hw=(document.getElementById('cihw')||{checked:true}).checked;
  n=n.trim();if(!n){toast('Escribe un nombre');return;}
  if(!D.cfg.customInst)D.cfg.customInst=[];
  D.cfg.customInst.push({id:'ci_'+uid(),name:n,weight:w,hasWeight:hw});
  rSet();saveCfg();
}
function rmInst(i){i=parseInt(i);(D.cfg.customInst||[]).splice(i,1);rSet();saveCfg();}
async function saveCfg(){try{await pushCfg();toast('Ajustes guardados');}catch(e){toast('Error');console.error(e);}}
function addEx(){
  var n=(document.getElementById('cen')||{}).value||'';
  var ic=(document.getElementById('cei')||{}).value||'💪';
  n=n.trim();if(!n){toast('Escribe un nombre');return;}
  if(!D.cfg.customEx)D.cfg.customEx=[];
  D.cfg.customEx.push({id:'cx_'+uid(),name:n,icon:ic.trim()||'💪'});
  rSet();saveCfg();
}
function rmEx(i){i=parseInt(i);(D.cfg.customEx||[]).splice(i,1);rSet();saveCfg();}

async function manualSave(){
  var btn=document.getElementById('savebtn');
  if(btn){btn.style.color='#c8a96e';btn.style.borderColor='#c8a96e';}
  try{
    await pushCfg();
    if(btn){btn.textContent='✓';btn.style.color='#4ac87e';btn.style.borderColor='#4ac87e';}
    toast('Todo guardado');
  }catch(e){
    if(btn){btn.textContent='!';btn.style.color='#c44';btn.style.borderColor='#c44';}
    toast('Error al guardar');console.error(e);
  }
  setTimeout(function(){if(btn){btn.textContent='💾';btn.style.color='#666';btn.style.borderColor='#2a2a2a';}},2000);
}

// ── INIT ──────────────────────────────────────────────────────────────────────
(async function(){
  try{
    var res=await Promise.all([loadAll(),loadCfg()]);
    D.sessions=res[0]||[];
    if(res[1]){
      D.cfg=Object.assign(JSON.parse(JSON.stringify(DEF)),res[1]);
      if(!D.cfg.customEx)D.cfg.customEx=[];
      if(!D.cfg.customInst)D.cfg.customInst=[];
      if(!D.cfg.meals)D.cfg.meals=[];
    }
  }catch(e){console.error('Init:',e);}
  var ls=document.getElementById('ls');ls.classList.add('hide');setTimeout(function(){ls.style.display='none';},400);
  var app=document.getElementById('app');app.style.display='flex';app.style.flexDirection='column';
  rLog();rProg();rNut();rSet();
})();
</script>
